<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <meta content="Music" property="og:title" />
    <meta content="All my favorite songs!" property="og:description" />
    <meta content="https://0lsnowy.xyz" property="og:url" />
    <meta content="https://0lsnowy.xyz/images/img4.jpg" property="og:image" />
    <meta content="#221736" data-react-helmet="true" name="theme-color" />
    <script src="https://kit.fontawesome.com/9f2249c235.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --text-primary: #ffffff;
            --text-secondary: #bbbbbb;
            --accent-color: #ffffff;
            --accent-hover: #a39090;
            --animation-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), url('/background/catlamp1.png') center/cover no-repeat fixed;
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
        }

        /* Smooth section transitions */
        .top-row,
        .bottom-row,
        .music-module {
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0.8;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Profile Section - Full Viewport */
        .top-row {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            width: 100%;
            position: relative;
        }

        .profile-module {
            background: rgba(22, 21, 21, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 2rem 2.5rem;
            max-width: 700px;
            width: 100%;
        }

        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            text-align: center;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
        }

        .profile-info h1 {
            font-size: 2.5rem;
            margin: 0;
            white-space: normal;
        }

        .profile-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .back-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .back-link:hover {
            color: var(--accent-hover);
        }

        .scroll-hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.3s ease;
            display: block;
            opacity: 1;
            pointer-events: all;
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
        }

        .scroll-hint:hover {
            transform: translateX(-50%) translateY(-3px);
            color: var(--accent-color);
        }

        /* Content Section */
        .bottom-row {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding: 4rem 1rem;
            align-items: center;
            justify-content: center;
        }

        .bottom-row .module {
            background: rgba(22, 21, 21, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            max-width: 900px;
            width: 100%;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            margin-top: 0;
            text-align: center;
        }

        .module h2 {
            color: var(--accent-color);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .social-card {
            background-color: rgba(22, 21, 21, 0.5);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform var(--animation-speed), box-shadow var(--animation-speed), border-color var(--animation-speed);
            display: flex;
            align-items: center;
        }

        .social-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            border-color: var(--accent-color);
        }

        .social-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            margin-right: 15px;
            border-radius: 50%;
        }

        .social-info {
            flex: 1;
        }

        .social-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .social-link {
            color: var(--text-secondary);
            font-size: 0.85rem;
            word-break: break-all;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color var(--animation-speed);
        }

        a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* Genre filter button styles */
        .genre-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .genre-btn {
            background: rgba(22, 21, 21, 0.5);
            color: var(--accent-color);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            padding: 7px 18px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background var(--animation-speed), color var(--animation-speed), border-color var(--animation-speed);
        }

        .genre-btn:hover {
            background: rgba(160, 132, 132, 0.3);
            border-color: var(--accent-hover);
        }

        .genre-btn.active {
            background: var(--accent-color);
            color: #000000;
            border-color: var(--accent-color);
        }

        .cat-ascii {
            text-align: center;
            margin: 30px 0;
            color: var(--text-primary);
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
            animation-delay: 0.5s;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .top-row {
                min-height: 100vh;
                padding: 1.5rem 0.75rem;
            }

            .profile-module {
                padding: 1.5rem;
            }

            .profile {
                gap: 1.5rem;
            }

            .profile-info h1 {
                font-size: 1.8rem;
            }

            .profile-subtitle {
                font-size: 0.95rem;
            }

            .bottom-row {
                min-height: auto;
                padding: 2rem 0.75rem;
                gap: 2rem;
            }

            .bottom-row .module {
                padding: 1.5rem;
                width: 100%;
            }

            h2 {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .social-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .scroll-hint {
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .top-row {
                min-height: 100vh;
                padding: 1rem 0.5rem;
            }

            .profile-module {
                padding: 1rem;
            }

            .profile-info h1 {
                font-size: 1.4rem;
            }

            .profile-subtitle {
                font-size: 0.9rem;
            }

            .bottom-row {
                padding: 1.5rem 0.5rem;
                gap: 1.5rem;
            }

            .bottom-row .module {
                padding: 1rem;
            }

            h2 {
                font-size: 1.25rem;
                margin-bottom: 1rem;
            }

            .social-grid {
                grid-template-columns: 1fr;
            }

            .genre-filters {
                margin-bottom: 1rem;
            }

            .genre-btn {
                padding: 6px 14px;
                font-size: 0.9rem;
            }
        }

        /* Landscape adjustments */
        @media (max-height: 600px) and (orientation: landscape) {
            .top-row {
                min-height: auto;
                padding: 1rem 0.5rem;
            }

            .profile-module {
                padding: 1rem;
            }

            .bottom-row {
                min-height: auto;
                padding: 1.5rem 0.5rem;
            }

            h2 {
                font-size: 1.2rem;
                margin-bottom: 0.75rem;
            }

            .profile-info h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="top-row">
            <div class="profile-module">
                <div class="profile">
                    <div class="profile-info">
                        <h1>⋆｡˚☽ Music Recommendations</h1>
                        <div class="profile-subtitle">All my favorite songs & playlists ᓚᘏᗢ</div>
                        <a href="links.html" class="back-link">&larr; Back to Links</a>
                    </div>
                </div>
            </div>
            <a href="#music-content" class="scroll-hint">↓ Scroll for music ↓</a>
        </div>

        <!-- Music Content Section -->
        <div class="bottom-row" id="music-content">
            <!-- Album of the Month -->
            <div class="module">
                <h2>⋆｡˚☽ Album of the Month</h2>
                <div id="album-of-the-month"></div>
            </div>

            <!-- Playlists -->
            <div class="module">
                <h2>⋆｡˚☽ Playlists</h2>
                <div id="playlist-list" class="social-grid"></div>
            </div>

            <!-- Songs by Genre -->
            <div class="module">
                <h2>⋆｡˚☽ Songs by Genre</h2>
                <div id="genre-filters" class="genre-filters"></div>
                <div id="spotify-list" class="social-grid"></div>
            </div>

            <div class="cat-ascii">
                <pre>
    |\__/,|   (`\
  _.|o o  |_   ) )
  -(((---(((--------
                </pre>
            </div>
        </div>
    </div>

    <footer>
        2025 Snowy0Web - Made with love by 0lsnowy♡
    </footer>

    <script src="spotify_data.js"></script>
    <script>
        const albumContainer = document.getElementById("album-of-the-month");
        const filtersContainer = document.getElementById("genre-filters");
        const songsContainer = document.getElementById("spotify-list");
        const playlistsContainer = document.getElementById("playlist-list");

        const genres = [...new Set(spotifySongs.map(song => song.genre))];

        function renderAlbum() {
            if (spotifyAlbumOfTheMonth) {
                albumContainer.innerHTML = `
                    <div class="social-card">
                        <div class="social-icon" style="background-image: url('${spotifyAlbumOfTheMonth.cover}'); background-size: cover; background-position: center;"></div>
                        <div class="social-info">
                            <div class="social-name">${spotifyAlbumOfTheMonth.title}</div>
                            <div class="social-link">By ${spotifyAlbumOfTheMonth.artist}</div>
                            <a href="${spotifyAlbumOfTheMonth.link}" target="_blank">Listen</a>
                        </div>
                    </div>
                `;
            }
        }

        function renderFilters() {
            filtersContainer.innerHTML = `<button class="genre-btn active" onclick="filterSongs('All')">All</button>` +
                genres.map(g => `<button class="genre-btn" onclick="filterSongs('${g}')">${g}</button>`).join('');
        }

        function filterSongs(genre) {
            const filtered = genre === 'All' ? spotifySongs : spotifySongs.filter(s => s.genre === genre);
            renderSongs(filtered);
            
            // Update active button
            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function renderSongs(songs) {
            songsContainer.innerHTML = songs.map(song => `
                <div class="social-card">
                    <div class="social-icon" style="background-image: url('${song.cover}'); background-size: cover; background-position: center;"></div>
                    <div class="social-info">
                        <div class="social-name">${song.title}</div>
                        <div class="social-link">${song.artist} — <em>${song.genre}</em></div>
                        <a href="${song.link}" target="_blank">Listen</a>
                    </div>
                </div>
            `).join('');
        }

        function renderPlaylists() {
            playlistsContainer.innerHTML = spotifyPlaylists.map(playlist => `
                <div class="social-card">
                    <div class="social-icon" style="background-image: url('${playlist.cover}'); background-size: cover; background-position: center;"></div>
                    <div class="social-info">
                        <div class="social-name">${playlist.title}</div>
                        <div class="social-link">${playlist.description}</div>
                        <a href="${playlist.link}" target="_blank">Open Playlist</a>
                    </div>
                </div>
            `).join('');
        }

        renderAlbum();
        renderFilters();
        renderSongs(spotifySongs);
        renderPlaylists();

        // Auto-scroll on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('music-content').scrollIntoView({ behavior: 'smooth' });
            }, 1500);
        });

        // Smooth scroll hint
        document.querySelector('.scroll-hint').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('music-content').scrollIntoView({ behavior: 'smooth' });
        });

        // Fade scroll hint on scroll
        const scrollHint = document.querySelector('.scroll-hint');
        const topRow = document.querySelector('.top-row');
        
        window.addEventListener('scroll', () => {
            const topRowBottom = topRow.offsetHeight;
            const scrollProgress = window.scrollY / topRowBottom;
            const opacity = Math.max(0, 1 - scrollProgress);
            scrollHint.style.opacity = opacity;
            scrollHint.style.pointerEvents = opacity < 0.2 ? 'none' : 'auto';
        });

        // Intersection Observer for smooth section animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px'
        };

        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        // Observe all sections for smooth scroll animations
        document.querySelectorAll('.top-row, .bottom-row').forEach(section => {
            section.style.opacity = '0.95';
            section.style.transform = 'translateY(0)';
            section.style.transition = 'opacity 0.8s ease-out, transform 0.8s ease-out';
            sectionObserver.observe(section);
        });

        // Prevent scroll jumping on hash navigation
        window.addEventListener('hashchange', (e) => {
            e.preventDefault();
            const target = document.querySelector(window.location.hash);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }, false);
    </script>
</body>
</html>
